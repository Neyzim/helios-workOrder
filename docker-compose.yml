services:
  workorder-api:
    build:
      context: .
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/helios
      SPRING_DATASOURCE_USERNAME: helios_admin
      SPRING_DATASOURCE_PASSWORD: 1234567890
    networks:
      - helios-network

networks:
  helios-network:
    external: true


